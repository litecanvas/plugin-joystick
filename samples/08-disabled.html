<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,
    user-scalable=no, initial-scale=1, maximum-scale=1, user-scalable=0"
    />
    <title>litecanvas Game</title>
    <style type="text/css">
      body {
        background: #000;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/litecanvas"></script>
    <script src="../dist/dist.js"></script>
    <script>
      let actor,
        enabled = false

      litecanvas()

      function init() {
        use(pluginJoystick, {
          enabled: enabled,
        })

        actor = {
          x: W / 2,
          y: H / 2,
          speed: 100,
        }
      }

      function update(dt) {
        if (iskeypressed("space")) {
          enabled = !enabled
          enabled ? joystick.enable() : joystick.disable()
        }

        if (joystick.on) {
          const { angle, force } = joystick
          actor.x += actor.speed * force * cos(angle) * dt
          actor.y += actor.speed * force * sin(angle) * dt
        }
      }

      function draw() {
        cls(enabled ? 2 : 0)
        circfill(actor.x, actor.y, 32, 3)
        text(
          10,
          10,
          `Press space to ${enabled ? "Disable" : "Enable"} the joystick`
        )
      }
    </script>
  </body>
</html>
